version: "3.7"
services:
  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
      - "8920:8920"
    group_add:
      - ${RENDER_ID}
      - ${VIDEO_ID}
    user: ${DUID}:${DGID}
    environment:
      - UMASK=002
      - TZ=Etc/UTC
      - ROC_ENABLE_PRE_VEGA=1
      # Required defines for where different things live
      - JELLYFIN_CACHE_DIR=/var/cache/jellyfin
      - JELLYFIN_CONFIG_DIR=/etc/jellyfin
      - JELLYFIN_DATA_DIR=/var/lib/jellyfin
      - JELLYFIN_LOG_DIR=/var/log/jellyfin
    volumes:
      - /srv/media-server/data/jellyfin_log:/var/log/jellyfin
      - /srv/media-server/data/jellyfin_cache:/var/cache/jellyfin
      - /srv/media-server/data/jellyfin_data:/var/lib/jellyfin
      - /srv/media-server/data/config/jellyfin:/etc/jellyfin
      - /srv/media-server/data:/data
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128

  sonarr:
    image: ghcr.io/hotio/sonarr
    container_name: sonarr
    restart: unless-stopped
    ports:
      - "8989:8989"
    environment:
      - PUID=${DUID}
      - PGID=${DGID}
      - UMASK=002 # Single user
      - TZ=Etc/UTC
    volumes:
      - /srv/media-server/data/config/sonarr:/config
      - /srv/media-server/data:/data

  radarr:
    image: ghcr.io/hotio/radarr
    container_name: radarr
    restart: unless-stopped
    ports:
      - "7878:7878"
    environment:
      - PUID=${DUID}
      - PGID=${DGID}
      - UMASK=002 # Single user
      - TZ=Etc/UTC
    volumes:
      - /srv/media-server/data/config/radarr:/config
      - /srv/media-server/data:/data

  # readarr:
  #   image: ghcr.io/hotio/readarr
  #   container_name: readarr
  #   restart: unless-stopped
  #   ports:
  #     - "8787:8787"
  #   environment:
  #     - PUID=${DUID}
  #     - PGID=${DGID}
  #     - UMASK=002 # Single user
  #     - TZ=Etc/UTC
  #   volumes:
  #     - /srv/media-server/data/config/readarr:/config
  #     - /srv/media-server/data:/data

  lidarr:
    image: ghcr.io/hotio/lidarr
    container_name: lidarr
    restart: unless-stopped
    ports:
      - "8686:8686"
    environment:
      - PUID=${DUID}
      - PGID=${DGID}
      - UMASK=002 # Single user
      - TZ=Etc/UTC
    volumes:
      - /srv/media-server/data/config/lidarr:/config
      - /srv/media-server/data:/data

  jellyseerr:
    image: ghcr.io/hotio/jellyseerr
    container_name: jellyseerr
    restart: unless-stopped
    ports:
      - "5055:5055"
    environment:
      - PUID=${DUID}
      - PGID=${DGID}
      - UMASK=002 # Single user
      - TZ=Etc/UTC
    volumes:
      - /srv/media-server/data/config/jellyseerr:/config

  prowlarr:
    image: ghcr.io/hotio/prowlarr
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    environment:
      - PUID=${DUID}
      - PGID=${DGID}
      - UMASK=002 # Single user
      - TZ=Etc/UTC
    volumes:
      - /srv/media-server/data/config/prowlarr:/config

  deluge:
    image: lscr.io/linuxserver/deluge:latest
    container_name: deluge
    environment:
      - PUID=${DUID}
      - PGID=${DGID}
      - UMASK=002
      - TZ=Etc/UTC
      - DELUGE_LOGLEVEL=error
    volumes:
      - /srv/media-server/data/config/deluge:/config
      - /srv/media-server/data/torrents:/data/torrents
    ports:
      - 8112:8112
      - 6881:6881
      - 6881:6881/udp
      - 58846:58846
    restart: unless-stopped
